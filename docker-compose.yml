services:
  jobmanager:
    image: flink:1.20-scala_2.12
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    volumes:
      - ./target:/opt/flink/usrlib
    networks:
      - default
      - kafka-net

  taskmanager:
    image: flink:1.20-scala_2.12
    depends_on:
      - jobmanager
    command: taskmanager
    scale: 1
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
    networks:
      - default
      - kafka-net

networks:
  default: {}
  kafka-net:
    external: true
    name: ${KAFKA_NETWORK_NAME:-kafka-example_default}
